<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Primary Meta Tags -->
    <title>Rahmat Sugiarto | Mobile Developer</title>
    <meta name="title" content="Rahmat Sugiarto | Mobile Developer" />
    <meta name="description" content="Portfolio of Rahmat Sugiarto, an experienced Mobile Developer." />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://rahmatsugiarto.vercel.app/" />
    <meta property="og:title" content="Rahmat Sugiarto | Mobile Developer" />
    <meta property="og:description" content="Portfolio of Rahmat Sugiarto, an experienced Mobile Developer." />
    <meta property="og:image" content="https://rahmatsugiarto.vercel.app/logo.svg" />
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://rahmatsugiarto.vercel.app/" />
    <meta property="twitter:title" content="Rahmat Sugiarto | Mobile Developer" />
    <meta property="twitter:description" content="Portfolio of Rahmat Sugiarto, an experienced Mobile Developer." />
    <meta property="twitter:image" content="https://rahmatsugiarto.vercel.app/logo.svg" />

    <script>
      if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark')
      } else {
        document.documentElement.classList.remove('dark')
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root">
      <!-- Pre-React Loading Indicator (shown during JS bundle download on cold starts) -->
      <div id="pre-loader" style="position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;">
        <div id="pre-loader-logo" style="width:80px;height:80px;border-radius:22px;display:flex;align-items:center;justify-content:center;animation:pre-pulse 2s ease-in-out infinite;">
          <span id="pre-loader-text" style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:44px;letter-spacing:-0.05em;line-height:1;">R</span>
        </div>
      </div>
      <style>
        @keyframes pre-pulse {
          0%, 100% { transform: scale(1); opacity: 0.8; }
          50% { transform: scale(1.05); opacity: 1; }
        }
      </style>
      <script>
        // Apply dark/light theme to pre-loader immediately (same logic as <head> script)
        (function() {
          var isDark = document.documentElement.classList.contains('dark');
          var loader = document.getElementById('pre-loader');
          var logo = document.getElementById('pre-loader-logo');
          var text = document.getElementById('pre-loader-text');
          if (isDark) {
            loader.style.background = '#050505';
            logo.style.background = '#ffffff';
            text.style.color = '#0a0a0a';
          } else {
            loader.style.background = '#FAFAFA';
            logo.style.background = '#0a0a0a';
            text.style.color = '#ffffff';
          }
        })();
      </script>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
